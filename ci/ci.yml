# NOTE: GitHub blocked the automation token from writing workflow files.
# To enable CI, move this file into place (one command):
#   git mv ci/ci.yml .github/workflows/ci.yml && git commit -m 'ci: enable workflow' && git push

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
