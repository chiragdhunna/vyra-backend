# NOTE: GitHub blocked the automation token from writing workflow files.
# To enable CI, move this file into place (one command):
#   git mv ci/ci.yml .github/workflows/ci.yml && git commit -m 'ci: enable workflow' && git push

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q --tb=short

  smoke:
    name: boot + REST smoke (echo provider)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
      - name: Boot server and hit endpoints
        run: |
          AI_PROVIDER=echo TTS_PROVIDER=device nohup python -m uvicorn app.main:app --port 8123 &
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:8123/healthz && break || sleep 0.5; done
          curl -sf http://127.0.0.1:8123/config
          curl -sf -X POST http://127.0.0.1:8123/chat \
            -H 'content-type: application/json' \
            -d '{"messages":[{"role":"user","content":"ci smoke"}]}' | grep -q '"emotion"'
